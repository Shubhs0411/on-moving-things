<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Can I Park Here?</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #27AE60;
      --red:     #E74C3C;
      --amber:   #F39C12;
      --purple:  #8E44AD;
      --gray:    #BDC3C7;
      --dark:    #1A1A2E;
      --mid:     #16213E;
      --ink:     #0F3460;
      --white:   #FAFAFA;
      --cell-h:  14px;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--mid);
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 3px solid var(--ink);
    }
    header svg { flex-shrink: 0; }
    header h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.5px; }
    header p  { font-size: 0.78rem; opacity: 0.6; margin-top: 2px; }

    /* ── Main layout ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    /* ── Upload card ── */
    .upload-card {
      background: var(--mid);
      border-radius: 16px;
      padding: 2rem;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .drop-zone {
      border: 2.5px dashed rgba(255,255,255,0.25);
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.03);
    }
    .drop-zone input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }
    .drop-icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .drop-label { font-size: 1.1rem; font-weight: 700; }
    .drop-sub   { font-size: 0.82rem; opacity: 0.5; margin-top: 0.4rem; }

    .preview-wrap {
      display: none;
      margin-top: 1.2rem;
      border-radius: 10px;
      overflow: hidden;
      max-height: 280px;
      text-align: center;
      background: #000;
    }
    .preview-wrap img {
      max-height: 280px;
      max-width: 100%;
      object-fit: contain;
    }

    /* ── Form fields ── */
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .field-group { flex: 1; min-width: 180px; }
    .field-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 0.5rem;
    }
    .field-group select,
    .field-group input[type=text] {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: var(--white);
      padding: 0.6rem 0.9rem;
      font-size: 0.9rem;
      appearance: none;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 1.2rem;
      font-size: 0.9rem;
    }
    .checkbox-row input[type=checkbox] {
      width: 18px; height: 18px; accent-color: var(--green); cursor: pointer;
    }

    /* ── Check button ── */
    #checkBtn {
      display: block;
      margin-top: 1.5rem;
      width: 100%;
      padding: 1rem;
      background: var(--green);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    #checkBtn:hover  { opacity: 0.9; }
    #checkBtn:active { transform: scale(0.98); }
    #checkBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Loader ── */
    #loader {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader p { opacity: 0.6; font-size: 0.9rem; }

    /* ── Error ── */
    #error-msg {
      display: none;
      background: rgba(231,76,60,0.15);
      border: 1px solid var(--red);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      color: #FF6B6B;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    /* ════════════════════════════════════════════════
       RESULTS  —  Nikki Sylianteng style
    ════════════════════════════════════════════════ */
    #results { display: none; margin-top: 2.5rem; }

    /* ── Verdict banner ── */
    .verdict-banner {
      border-radius: 16px;
      padding: 2rem 2.5rem;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }
    .verdict-banner.can   { background: var(--green); }
    .verdict-banner.cant  { background: var(--red);   }
    .verdict-banner.timed { background: var(--amber);  color: #1a1a1a; }
    .verdict-banner.permit{ background: var(--purple); }

    .verdict-flag {
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.8;
    }
    .verdict-main {
      font-size: clamp(2rem, 6vw, 3.6rem);
      font-weight: 900;
      line-height: 1.05;
      margin-top: 0.3rem;
      letter-spacing: -1px;
    }
    .verdict-sub {
      margin-top: 0.7rem;
      font-size: 1rem;
      opacity: 0.85;
    }
    .verdict-bg-text {
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: clamp(5rem, 18vw, 11rem);
      font-weight: 900;
      opacity: 0.08;
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }

    /* ── Schedule section ── */
    .schedule-section {
      background: var(--mid);
      border-radius: 16px;
      padding: 1.5rem;
      border: 1px solid rgba(255,255,255,0.06);
      overflow-x: auto;
    }
    .schedule-title {
      font-size: 0.7rem;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 1.2rem;
    }

    /* ── Grid ── */
    .park-grid {
      display: grid;
      /* col 0: time labels, cols 1-7: days */
      grid-template-columns: 52px repeat(7, 1fr);
      gap: 2px;
      min-width: 460px;
    }

    .gh { /* grid header cell */
      font-size: 0.68rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-align: center;
      padding: 4px 0 8px;
      opacity: 0.5;
    }
    .gh.today {
      opacity: 1;
      color: #fff;
      position: relative;
    }
    .gh.today::after {
      content: '';
      display: block;
      margin: 3px auto 0;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .tl { /* time label */
      font-size: 0.62rem;
      opacity: 0.35;
      text-align: right;
      padding-right: 6px;
      line-height: var(--cell-h);
      height: var(--cell-h);
      white-space: nowrap;
    }
    .tl.now-label {
      opacity: 1;
      font-weight: 700;
      color: #fff;
    }

    .gc { /* grid cell */
      height: var(--cell-h);
      border-radius: 2px;
      position: relative;
      transition: opacity 0.15s;
    }
    .gc:hover { opacity: 0.75; }

    .gc.CAN_PARK       { background: var(--green);  }
    .gc.CANNOT_PARK    { background: var(--red);    }
    .gc.TIMED_PARK     { background: var(--amber);  }
    .gc.PERMIT_REQUIRED{ background: var(--purple); }

    /* "YOU ARE HERE" row highlight */
    .gc.now-cell {
      outline: 2px solid #fff;
      outline-offset: -1px;
      z-index: 2;
    }

    /* Empty placeholder for the header row's time column */
    .gh-spacer { grid-column: 1; }

    /* ── The "you are here" bar ── */
    .you-are-here-row {
      display: contents; /* participates in grid */
    }
    .yah-label {
      font-size: 0.6rem;
      font-weight: 900;
      color: #fff;
      text-align: right;
      padding-right: 6px;
      white-space: nowrap;
      line-height: var(--cell-h);
      height: var(--cell-h);
      letter-spacing: 0.04em;
    }
    .yah-bar {
      height: var(--cell-h);
      background: transparent;
      border-top: 2px dashed rgba(255,255,255,0.5);
      position: relative;
    }
    .yah-bar.today-col {
      border-top-color: #fff;
      border-top-width: 2px;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1.2rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      opacity: 0.7;
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 2px;
    }

    /* ── Sign info card ── */
    .sign-card {
      background: var(--mid);
      border-radius: 16px;
      padding: 1.5rem;
      margin-top: 1.5rem;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .sign-card h3 {
      font-size: 0.7rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-bottom: 0.8rem;
    }
    .sign-text-display {
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      white-space: pre-wrap;
      line-height: 1.6;
      color: #E8F4FD;
    }
    .sign-interp {
      margin-top: 1rem;
      font-size: 0.9rem;
      line-height: 1.6;
      opacity: 0.8;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header h1 { font-size: 1.1rem; }
      .upload-card { padding: 1.2rem; }
      .verdict-main { letter-spacing: -0.5px; }
    }
  </style>
</head>
<body>

<header>
  <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
    <rect width="36" height="36" rx="8" fill="#27AE60"/>
    <text x="18" y="26" font-size="20" text-anchor="middle" font-family="Helvetica Neue,Arial" font-weight="900" fill="white">P</text>
  </svg>
  <div>
    <h1>Can I Park Here?</h1>
    <p>Photograph a parking sign — get an instant visual answer</p>
  </div>
</header>

<main>

  <!-- ── Upload card ── -->
  <div class="upload-card" id="uploadCard">

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*" capture="environment" />
      <div class="drop-icon">📷</div>
      <div class="drop-label">Take or upload a photo of the parking sign</div>
      <div class="drop-sub">JPEG · PNG · WEBP &nbsp;|&nbsp; Tap to open camera on mobile</div>
    </div>

    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="Parking sign preview" />
    </div>

    <div class="form-row">
      <div class="field-group">
        <label for="vehicleType">Vehicle type</label>
        <select id="vehicleType">
          <option value="regular">Regular Car / SUV</option>
          <option value="truck">Pickup Truck</option>
          <option value="commercial">Commercial Vehicle</option>
          <option value="motorcycle">Motorcycle</option>
        </select>
      </div>
      <div class="field-group" id="permitTypeGroup" style="display:none">
        <label for="permitType">Permit type / zone</label>
        <input type="text" id="permitType" placeholder="e.g. A, B, Zone 3" />
      </div>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="hasPermit" />
      <label for="hasPermit">I have a residential / area permit</label>
    </div>

    <button id="checkBtn" disabled>Check Parking</button>

    <div id="error-msg"></div>
  </div>

  <!-- ── Loader ── -->
  <div id="loader">
    <div class="spinner"></div>
    <p>Reading the sign with AI…</p>
  </div>

  <!-- ══════════════════════════════════════
       RESULTS
  ══════════════════════════════════════ -->
  <div id="results">

    <!-- Verdict banner -->
    <div class="verdict-banner" id="verdictBanner">
      <div class="verdict-flag" id="verdictFlag"></div>
      <div class="verdict-main" id="verdictMain"></div>
      <div class="verdict-sub"  id="verdictSub"></div>
      <div class="verdict-bg-text" id="verdictBg"></div>
    </div>

    <!-- Weekly schedule grid -->
    <div class="schedule-section">
      <div class="schedule-title">Weekly parking schedule &nbsp;·&nbsp; <span id="gridLabel"></span></div>
      <div class="park-grid" id="parkGrid"></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Can park</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> No parking</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div> Time-limited</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div> Permit only</div>
      </div>
    </div>

    <!-- Sign text + interpretation -->
    <div class="sign-card">
      <h3>Sign text</h3>
      <div class="sign-text-display" id="signTextDisplay"></div>
      <div class="sign-interp" id="signInterp"></div>
    </div>

  </div><!-- /results -->

</main>

<script>
/* ── Helpers ── */
const $ = id => document.getElementById(id);

const DAYS    = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
const DISPLAY_START = 10;  // 5:00 AM  (slot = hour*2 + (min>=30?1:0))
const DISPLAY_END   = 47;  // 11:30 PM

function slotToLabel(slot) {
  const h   = Math.floor(slot / 2);
  const min = slot % 2 === 0 ? '00' : '30';
  const ampm = h < 12 ? 'AM' : 'PM';
  const h12  = h % 12 || 12;
  return min === '00' ? `${h12} ${ampm}` : '';  // label only on the hour
}

/* ── Drag-and-drop ── */
const dropZone  = $('dropZone');
const fileInput = $('fileInput');
let selectedFile = null;

['dragenter','dragover'].forEach(evt => {
  dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.add('dragover'); });
});
['dragleave','drop'].forEach(evt => {
  dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.remove('dragover'); });
});
dropZone.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) setFile(fileInput.files[0]);
});

function setFile(f) {
  selectedFile = f;
  const reader = new FileReader();
  reader.onload = ev => {
    $('previewImg').src = ev.target.result;
    $('previewWrap').style.display = 'block';
  };
  reader.readAsDataURL(f);
  $('checkBtn').disabled = false;
}

/* ── Permit toggle ── */
$('hasPermit').addEventListener('change', function() {
  $('permitTypeGroup').style.display = this.checked ? '' : 'none';
});

/* ── Submit ── */
$('checkBtn').addEventListener('click', async () => {
  if (!selectedFile) return;

  $('uploadCard').style.display = 'none';
  $('loader').style.display     = 'block';
  $('results').style.display    = 'none';
  $('error-msg').style.display  = 'none';

  const fd = new FormData();
  fd.append('image', selectedFile);
  fd.append('vehicle_type', $('vehicleType').value);
  fd.append('has_permit',   $('hasPermit').checked);
  fd.append('permit_type',  $('permitType').value);

  try {
    const res  = await fetch('/api/check', { method: 'POST', body: fd });
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    const data = await res.json();
    renderResults(data);
  } catch (err) {
    $('loader').style.display    = 'none';
    $('uploadCard').style.display = '';
    const em = $('error-msg');
    em.textContent = `⚠ ${err.message || 'Something went wrong. Please try again.'}`;
    em.style.display = 'block';
  }
});

/* ══════════════════════════════════════════
   RENDER RESULTS
══════════════════════════════════════════ */
function renderResults({ grid, verdict, sign_text, interpretation }) {
  $('loader').style.display  = 'none';
  $('results').style.display = '';

  renderVerdict(verdict);
  renderGrid(grid, verdict);

  $('signTextDisplay').textContent = sign_text || '(could not extract text)';
  $('signInterp').textContent      = interpretation || '';
}

/* ── Verdict banner ── */
function renderVerdict(v) {
  const banner = $('verdictBanner');
  const status = v.status;
  let cls, flag, main, sub, bg;

  if (status === 'CAN_PARK') {
    cls = 'can';
    flag = 'Right now · ' + v.current_day_full + ' · ' + v.current_time;
    main = 'YES, YOU CAN\nPARK HERE.';
    sub  = 'No restrictions apply at this moment.';
    bg   = 'YES';
  } else if (status === 'CANNOT_PARK') {
    cls = 'cant';
    flag = 'Right now · ' + v.current_day_full + ' · ' + v.current_time;
    main = 'NO, YOU CANNOT\nPARK HERE.';
    sub  = 'A parking restriction is in effect.';
    bg   = 'NO';
  } else if (status === 'TIMED_PARK') {
    cls = 'timed';
    flag = 'Right now · ' + v.current_day_full + ' · ' + v.current_time;
    main = 'YES, BUT\nTIME-LIMITED.';
    sub  = 'Check the sign for maximum stay duration.';
    bg   = 'YES';
  } else {
    cls = 'permit';
    flag = 'Right now · ' + v.current_day_full + ' · ' + v.current_time;
    main = 'PERMIT\nREQUIRED.';
    sub  = 'This spot requires a residential or area permit.';
    bg   = 'P';
  }

  banner.className = 'verdict-banner ' + cls;
  $('verdictFlag').textContent = flag;
  $('verdictMain').style.whiteSpace = 'pre-line';
  $('verdictMain').textContent = main;
  $('verdictSub').textContent  = sub;
  $('verdictBg').textContent   = bg;
}

/* ── Grid ── */
function renderGrid(grid, verdict) {
  const g       = $('parkGrid');
  const nowSlot = verdict.current_slot;
  const nowDay  = verdict.day_index;   // 0=MON … 6=SUN
  const clamp   = s => Math.max(DISPLAY_START, Math.min(DISPLAY_END, s));
  const nowSlotClamped = clamp(nowSlot);
  const isNowVisible = nowSlot >= DISPLAY_START && nowSlot <= DISPLAY_END;

  $('gridLabel').textContent = `${verdict.current_day_full} · ${verdict.current_time}`;

  let html = '';

  /* Header row */
  html += `<div class="gh-spacer gh"></div>`;
  DAYS.forEach((d, i) => {
    const today = i === nowDay ? ' today' : '';
    html += `<div class="gh${today}">${d}</div>`;
  });

  /* Time rows */
  for (let slot = DISPLAY_START; slot <= DISPLAY_END; slot++) {
    const label      = slotToLabel(slot);
    const isNowRow   = slot === nowSlotClamped && isNowVisible;

    /* Time label column */
    html += `<div class="tl${isNowRow ? ' now-label' : ''}">${label}</div>`;

    /* Day cells */
    DAYS.forEach((day, di) => {
      const slotObj    = (grid[day] || []).find(s => s.slot === slot);
      const status     = slotObj ? slotObj.status : 'CAN_PARK';
      const isNowCell  = isNowRow && di === nowDay;
      html += `<div class="gc ${status}${isNowCell ? ' now-cell' : ''}"></div>`;
    });

    /* "YOU ARE HERE" dashed line row — inserted AFTER the now-row */
    if (isNowRow) {
      html += `<div class="yah-label">← NOW</div>`;
      DAYS.forEach((_, di) => {
        html += `<div class="yah-bar${di === nowDay ? ' today-col' : ''}"></div>`;
      });
    }
  }

  g.innerHTML = html;
}
</script>

</body>
</html>
