name: Eval Gate

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Unit / structural tests (no API key required) ──────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest evals/ -m "not integration" -v --tb=short

      - name: Validate knowledge graph builds
        run: |
          python - <<'EOF'
          from src.knowledge.graph import FreightKnowledgeGraph
          g = FreightKnowledgeGraph().build()
          stats = g.stats()
          print(f"Graph built: {stats}")
          assert stats["nodes"] > 0, "Graph has no nodes"
          assert stats["edges"] > 0, "Graph has no edges"
          history = g.get_carrier_violation_history("2345678")
          assert len(history) > 0, "No violation history for test carrier 2345678"
          print(f"Violation history for 2345678: {len(history)} entries")
          top_regs = g.get_top_cited_regulations("2345678")
          print(f"Top cited regulations: {top_regs}")
          EOF

      - name: Validate FMCSA client (mock mode)
        run: |
          python - <<'EOF'
          from src.knowledge.fmcsa_api import FMCSAClient
          client = FMCSAClient()
          assert not client.is_live(), "Should be in mock mode without FMCSA_WEB_KEY"
          carrier = client.get_carrier("1234567")
          assert carrier.get("legal_name"), f"Missing legal_name: {carrier}"
          print(f"Mock carrier: {carrier['legal_name']} ({carrier.get('_source')})")
          status = client.status()
          print(f"Client status: {status}")
          EOF

      - name: Validate document ingester (no docling)
        run: |
          python - <<'EOF'
          from src.knowledge.ingester import DocumentIngester
          from src.knowledge.vectorstore import FreightKnowledgeBase
          kb = FreightKnowledgeBase()
          kb.ingest()
          ingester = DocumentIngester(kb=kb)
          result = ingester.ingest_text(
              "Test regulation: 49 CFR 395.3 limits driving to 11 hours.",
              title="Test Doc",
              category="HOS",
          )
          assert result["chunks_added"] > 0, f"No chunks added: {result}"
          print(f"Ingester result: {result}")
          EOF

      - name: Validate domain models
        run: |
          python - <<'EOF'
          from src.models.domain import Carrier, Driver, CSAScore
          from datetime import date
          csa = CSAScore(unsafe_driving=70, hours_of_service=82, vehicle_maintenance=91)
          violations = csa.violations()
          assert len(violations) == 3, f"Expected 3 violations, got {violations}"
          driver = Driver(
              license_number="CDL-TEST-001",
              license_state="TX",
              cdl_class="A",
              drug_test_status="POSITIVE",
              clearinghouse_status="PROHIBITED",
          )
          assert not driver.is_qualified(), "Prohibited driver should not be qualified"
          assert len(driver.disqualifying_offenses()) >= 2
          print(f"Model validation passed. Violations: {violations}")
          EOF

  # ── Integration eval (requires ANTHROPIC_API_KEY secret) ──────────────────
  integration-eval:
    name: Integration Eval Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run live eval harness
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FMCSA_WEB_KEY: ${{ secrets.FMCSA_WEB_KEY }}
          EVAL_MIN_PASS_RATE: "0.70"
          EVAL_N_CASES: "10"
          TRACE_ENABLED: "false"
        run: |
          python -m pytest evals/test_eval_harness.py \
            -m integration \
            -v --tb=short \
            --junitxml=evals/results/junit.xml
        continue-on-error: false

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: evals/results/
          retention-days: 30

      - name: Post eval summary to job
        if: always()
        run: |
          python - <<'EOF'
          import json, pathlib, sys
          results = sorted(pathlib.Path("evals/results").glob("eval_*.json"))
          if not results:
              print("No eval results found")
              sys.exit(0)
          data = json.loads(results[-1].read_text())
          summary = data["summary"]
          print(f"### Eval Results")
          print(f"Pass rate: {summary['pass_rate']}")
          print(f"Avg score: {summary['avg_score']}")
          print(f"Avg latency: {summary['avg_latency_ms']}ms")
          if summary.get("failed_cases"):
              print(f"Failed cases:")
              for fc in summary["failed_cases"]:
                  print(f"  - {fc['id']} (score={fc['score']}): missing {fc.get('keyword_misses', [])}")
          EOF
