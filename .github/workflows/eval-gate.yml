name: Eval Gate

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Unit / structural tests (no API key required) ──────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest evals/test_unit.py -v --tb=short

  # ── Integration eval (requires ANTHROPIC_API_KEY secret) ──────────────────
  integration-eval:
    name: Integration Eval Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run live eval harness
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FMCSA_WEB_KEY: ${{ secrets.FMCSA_WEB_KEY }}
          EVAL_MIN_PASS_RATE: "0.70"
          EVAL_N_CASES: "10"
          TRACE_ENABLED: "false"
        run: |
          python -m pytest evals/test_eval_harness.py \
            -m integration \
            -v --tb=short \
            --junitxml=evals/results/junit.xml
        continue-on-error: false

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: evals/results/
          retention-days: 30

      - name: Post eval summary to job
        if: always()
        run: |
          python - <<'EOF'
          import json, pathlib, sys
          results = sorted(pathlib.Path("evals/results").glob("eval_*.json"))
          if not results:
              print("No eval results found")
              sys.exit(0)
          data = json.loads(results[-1].read_text())
          summary = data["summary"]
          print(f"### Eval Results")
          print(f"Pass rate: {summary['pass_rate']}")
          print(f"Avg score: {summary['avg_score']}")
          print(f"Avg latency: {summary['avg_latency_ms']}ms")
          if summary.get("failed_cases"):
              print(f"Failed cases:")
              for fc in summary["failed_cases"]:
                  print(f"  - {fc['id']} (score={fc['score']}): missing {fc.get('keyword_misses', [])}")
          EOF
